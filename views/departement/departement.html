<div class="depart">

</div>
     <div class="gauche2">
        <button class="retour2">
<a href="/Dashboard/dashboard.html"><img src="/image/3585896.png" alt="retour"></a>

        </button>
    </div>
  
  <div class="Depar" id="departementList" style="display: flex; flex-direction: column; gap: 10px;"></div>

</div> 

   <script>
function loadDepartements() {
fetch('/api/departements')
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById('departementList');
      container.innerHTML = "";

      data.forEach(dep => {
        const item = document.createElement('div');
        item.style = 'display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #ccc; border-radius: 5px;';
        item.innerHTML = `
          <span>${dep.NOM_DEPARTEMENT} (Code: ${dep.CODE || ''})</span>
          <div>
            <button onclick="deleteDept(${dep.ID_DEPARTEMENT})" style="margin-right:5px;">Supprimer</button>
          </div>
        `;
        container.appendChild(item);
      });
    });
}


function deleteDept(id) {
  fetch(`/api/departements/${id}`, {
    method: "DELETE"
  })
  .then(() => loadDepartements());
}


// charger au démarrage
loadDepartements();
</script>
