<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style_gestion.css">
    <title>Total Employés finances</title>
</head>
<body>
  <div class="container">
  <h1>Total Employés finances</h1>

      <div class="gauche2">
        <button class="retour2">
<a href="/Dashboard/dashboard.html"><img src="/image/3585896.png" alt="retour"></a>
        </button>
    </div>
    <div class="droite2">
        <button class="ajouter2">
            <a href="/employe/Ajouter un employé.html"><img src="/image/1828921.png" alt="ajouter"></a>
        </button>
    </div>

  </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const DEPT = 'FI';

  // Auto-refresh
  function refreshPage() {
    location.reload();
  }

  setInterval(refreshPage, 30000);
  window.addEventListener('refresh-stats', refreshPage);

  try {
    const response = await fetch(`/api/employes/dept/${DEPT}`);
    const data = await response.json();

    // Total
    const h1 = document.querySelector('h1');
    const totalDiv = document.createElement('div');
    totalDiv.style.cssText = 'font-size: 1.5em; font-weight: bold; margin: 10px 0; color: #333;';
    totalDiv.textContent = `Total: ${data.total} employé(s)`;
    h1.after(totalDiv);

    // Cards
    const container = document.querySelector('.container');
    container.innerHTML += `
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
        ${data.employees.map(emp => {
          const fullName = `${emp.NOM || ''} ${emp.PRENOM || ''}`.trim();
          const role = emp.POSTE || 'Poste non défini';
          const email = emp.E_MAIL || 'N/A';
          const tel = emp.TELEPHONE || '';
          return `
            <div class="card">
              <a href="/employe/détails.html?id=${emp.ID_EMPLOYE}" class="card-link"></a>
              <div class="left">
                <p><strong>${fullName}</strong></p>
                <p>${role}</p>
                <p class="email">${email}</p>
                <p>${tel}</p>
              </div>
              <div class="right">
                <button class="btn-archive" onclick="if(confirm('Archiver?')) fetch('/api/employes/${emp.ID_EMPLOYE}',{method:'DELETE'}).then(refreshPage)">
                  <img src="/image/1343124.png" alt="Archiver">
                </button>
                <a href="/employe/modifie_employe.html?id=${emp.ID_EMPLOYE}" class="btn-modifier">
                  <img src="/image/10174003.png" alt="Modifier">
                </a>
                <span class="details" onclick="showDetails(${emp.ID_EMPLOYE})">Details</span>
              </div>
            </div>
          `;
        }).join('') || '<p style="text-align:center;color:#666;">Aucun employé Finances</p>'}
      </div>
    `;
  } catch (error) {
    console.error('Erreur:', error);
    document.querySelector('.container').innerHTML += '<p style="color:red;">Erreur chargement Finances</p>';
  }
});

function showDetails(id) {
  window.location.href = `/employe/détails.html?id=${id}`;
}
</script>
</body>
</html>
