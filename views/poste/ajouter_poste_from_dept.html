<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="/css/style_ajouter_poste.css"> 
    <title>ajouter un poste</title>
</head>
<body>

    <form class="formul" id="posteForm">
 <div class="ajout">
    <h1>Ajouter un Poste</h1>
    
    <div class="dep">
    <input type="text" id="NOM_POSTE" name="NOM_POSTE" placeholder="Nom du poste" required>
    </div>

     <div class="dep">
    <input type="text" id="CODE" name="CODE" placeholder="CODE" required>
    </div>

     <div class="dep">
    <select id="ID_EMPLOYE" name="ID_EMPLOYE">
      <option value="">Sélectionner un employé (optionnel)</option>
    </select>
    </div>

<div class="de">
 <div class="dpt">
     <button type="submit" class="enrg">Enregistrer</button> 
 </div>
    <div class="annu">
     <a href="/poste/poste.html" class="an">annuler</a>
 </div> 
</div>
</div> 
 </form>  

<script>
// Load employees dropdown
async function loadEmployees() {
  try {
    const res = await fetch('/api/employes');
    const employees = await res.json();
    const select = document.getElementById('ID_EMPLOYE');
    employees.forEach(emp => {
      const opt = document.createElement('option');
      opt.value = emp.ID_EMPLOYE;
      opt.text = `${emp.NOM || ''} ${emp.PRENOM || ''} (ID: ${emp.ID_EMPLOYE})`;
      select.appendChild(opt);
    });
  } catch (e) {
    console.error('Failed to load employees:', e);
  }
}

document.addEventListener('DOMContentLoaded', loadEmployees);

document.getElementById("posteForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const data = {
    ID_EMPLOYE: document.getElementById("ID_EMPLOYE").value || null,
    NOM_POSTE: document.getElementById("NOM_POSTE").value,
    CODE: document.getElementById("CODE").value
  };

  if (!data.NOM_POSTE || !data.CODE) {
    alert('Nom et CODE requis');
    return;
  }

  try {
    const response = await fetch("/api/poste", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (response.ok) {
      alert("Poste créé avec succès !");
      window.location.href = '/poste/poste.html';
    } else {
      alert("Erreur création poste: " + (result.error || 'Inconnue'));
      console.error(result);
    }
  } catch (error) {
    console.error("Fetch error:", error);
    alert("Erreur réseau");
  }
});
</script>  
</body>
</html>
