<script>
document.addEventListener('DOMContentLoaded', function() {
  // Dynamiquement charger les départements depuis la DB
let valuer = document.getElementById('choisir_un_departement');
console.log('Select département trouvé:', valuer);
  const select = document.getElementById('choisir_un_departement');
  if(!select) return console.error('selecte departement non trouvé');
  fetch('/api/departements')
    .then(res => res.json())
    .then(departements => {
      // Garde l'option par défaut, supprime les statiques
      select.innerHTML = '<option value="" disabled selected>Choisir un département</option>';
      
      departements.forEach(dept => {
        const option = document.createElement('option');
        option.value = dept.CODE || dept.NOM_DEPARTEMENT || 'IT';
        option.value = dept.CODE || dept.NOM_DEPARTEMENT || 'RH';
        option.value = dept.CODE || dept.NOM_DEPARTEMENT || 'finances';
        option.value = dept.CODE || dept.NOM_DEPARTEMENT || 'MK';
        option.textContent = dept.NOM_DEPARTEMENT || dept.CODE || 'Département non nommé';
        select.appendChild(option);
      });
      
      if (departements.length === 0) {
        select.innerHTML += '<option value="" disabled>Aucun département trouvé</option>';
      }
    })
    .catch(error => {
      console.error('Erreur chargement départements:', error);
      select.innerHTML += '<option value="" disabled>Erreur chargement</option>';
    });

  // Submit form existant
  const form = document.querySelector('form');
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(form);
    const submitBtn = form.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Enregistrement...';
    submitBtn.disabled = true;
    
    try {
      const response = await fetch('/api/employes', {
        method: 'POST',
        body: formData
      });
      
      const data = await response.json();
      
        if (data.success) {
          const dept = formData.get('CHOISIR_UN_DEPARTEMENT') || 'dashboard';
          alert('Employé ajouté avec succès!');
          window.dispatchEvent(new CustomEvent('refresh-stats'));
          
          // Ouvre page dept du nouvel employé
          if (dept !== '') {
            window.open('/employe/gestion des employé.html', '_blank');
          }
        window.location.href = '/employe/gestion des employé.html';  // Liste tous employés


        } else {
        throw new Error(data.error || 'Erreur inconnue');
      }
    } catch (error) {
      console.error('Erreur:', error);
      alert(' Erreur: ' + (error.message || 'Impossible d\'ajouter l\'employé'));
    } finally {
      submitBtn.textContent = originalText;
      submitBtn.disabled = false;
    }
  });
})
</script>
