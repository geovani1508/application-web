<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/css/style_inscription.css">
  <title>Inscription</title>
</head>
<body>
  <div class="inscription">
    <h1>Créer un compte utilisateur</h1>
    

    <form class="form-inscription" id="inscriptionForm">
      <div class="form-group">
        
        <input type="text" name="NOM" placeholder="Nom:" required>
      </div>
      
      <div class="form-group">
        
        <input type="text" name="PRENOM" placeholder="Prénom:" required>
      </div>
      

      <!-- Téléphone supprimé du formulaire -->

      
      <div class="form-group">
        
        <input type="email" name="E_MAIL" placeholder="Email:" required>
      </div>
      
      <div class="form-group">
        
        <input type="password" name="MOTS_DE_PASSE" placeholder="Mot de passe:" required>
      </div>
      
      <div class="form-group">
        <select name="ROLE" class="select-role" required>
          <option value="">Rôle:</option>
          <option value="user">utilisateur</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      
      <button type="submit" class="btn-inscription">S'inscrire</button>
    </form>
    <script>
document.getElementById('inscriptionForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const formData = new FormData(this);
  const dataObj = Object.fromEntries(formData.entries());

  const btn = this.querySelector('button[type="submit"]');
  const originalText = btn.textContent;
  btn.textContent = 'Création...';
  btn.disabled = true;
  
  try {
    const response = await fetch('/api/users/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json' // IMPORTANT
      },
      body: JSON.stringify(dataObj) // envoi JSON
    });



    const data = await response.json();
    
    if (response.ok && data.message) {
      alert('Bienvenue ' + data.message);
      window.location.href = 'views/Dashboard/dashboard.html';
    } else {
      throw new Error(data.message || 'Erreur création');
    }
  } catch (error) {
    alert('Erreur : ' + error.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
});
</script>

      Vous avez déjà un compte ?
